spring.application.name=shangcheng
server.port=8080
logging.level.root=INFO
logging.level.com.shangcheng=DEBUG
logging.level.org.springframework.security=DEBUG

spring.datasource.url=jdbc:h2:mem:shangcheng;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=shangchengJwtSecretKeyForJwtTokenGenerationVeryLongSecretKey123456
jwt.expiration=86400000

file.upload-dir=./uploads
